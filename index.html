<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Cucina – Kochbuch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <script src="recipes.js"></script>
  <style>
    .hero {
      padding: 4rem 2rem 2.5rem;
      max-width: 920px; margin: 0 auto;
    }
    .hero-eyebrow {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .2em; color: var(--muted);
      margin-bottom: 1rem; font-weight: 500;
    }
    .hero-title {
      font-family: var(--ff-display);
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      line-height: 1.04; color: var(--ink);
      transition: color .3s;
    }
    .hero-title em { font-style: italic; color: var(--accent); }
    .hero-sub {
      margin-top: 1rem; font-size: 1.05rem; color: var(--muted);
      font-weight: 300; max-width: 480px; line-height: 1.75;
    }
    .hero-divider {
      width: 56px; height: 2px;
      background: var(--gold); margin: 2rem 0; border-radius: 1px;
    }
    .stats-bar {
      display: flex; flex-wrap: wrap; gap: 2.5rem;
      padding: 0 2rem 3rem; max-width: 920px; margin: 0 auto;
    }
    .stat-num {
      font-family: var(--ff-display);
      font-size: 2.2rem; font-weight: 700; color: var(--accent);
    }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
    .section { max-width: 920px; margin: 0 auto; padding: 0 2rem 4rem; }
    .section-header {
      display: flex; align-items: baseline; gap: 1rem;
      margin-bottom: 1.5rem; padding-bottom: .75rem;
      border-bottom: 1px solid var(--border); transition: border-color .3s;
    }
    .section-title { font-family: var(--ff-display); font-size: 1.5rem; }
    .section-icon { font-size: 1.3rem; }
    .section-count { margin-left: auto; font-size: .8rem; color: var(--muted); }
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .recipe-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: .5rem;
      transition: transform .2s, box-shadow .2s, border-color .2s, background .3s;
      box-shadow: var(--shadow);
    }
    .recipe-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover); border-color: var(--gold);
    }
    .card-title { font-family: var(--ff-display); font-size: 1.05rem; line-height: 1.3; }
    .card-desc { font-size: .8rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: .5rem; margin-top: .25rem; flex-wrap: wrap; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .2rem; }
    .topbar-title { font-family: var(--ff-display); font-size: 1.2rem; letter-spacing: .01em; flex: 1; }
    .topbar-title em { font-style: italic; color: var(--accent); }
    footer {
      border-top: 1px solid var(--border); padding: 2rem; text-align: center;
      font-size: .8rem; color: var(--muted); transition: border-color .3s;
    }
    footer strong { color: var(--ink); font-family: var(--ff-display); }
    @media (max-width: 600px) {
      .hero { padding: 2.5rem 1.25rem 1.5rem; }
      .stats-bar { padding: 0 1.25rem 2rem; gap: 1.5rem; }
      .section { padding: 0 1.25rem 3rem; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<nav id="sidebar" aria-label="Rezept-Navigation">
  <div class="sb-header">
    <div class="sb-top-row">
      <a class="sb-logo" id="sb-logo" href="index.html"></a>
      <button class="sb-close" onclick="closeSidebar()" aria-label="Menü schließen">✕</button>
    </div>
    <div class="sb-search">
      <span class="sb-search-icon">🔍</span>
      <input id="sb-search-input" type="search" placeholder="Rezept suchen …" autocomplete="off" />
      <button class="sb-search-clear" id="sb-search-clear" aria-label="Suche löschen">✕</button>
    </div>
  </div>
  <div id="sb-search-results">
    <div class="sb-results-label">Treffer</div>
    <ul class="nav-items" id="sb-search-results-list"></ul>
  </div>
  <div id="sb-nav-body"></div>
  <div class="sb-footer">
    <span class="sb-footer-label">Erscheinungsbild</span>
    <div class="theme-toggle">
      <span class="theme-label">Dunkel</span>
      <div class="toggle-track on" onclick="toggleTheme()" role="switch" aria-label="Theme wechseln">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</nav>

<header id="topbar">
  <button class="burger-btn" onclick="openSidebar()" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-title" id="topbar-title"></div>
  <button class="topbar-theme-btn" onclick="toggleTheme()" aria-label="Theme wechseln">☀️</button>
</header>

<section class="hero">
  <p class="hero-eyebrow">Hausgemachte Rezepte mit Seele</p>
  <h1 class="hero-title" id="hero-title"></h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-divider"></div>
</section>

<div class="stats-bar" id="stats-bar"></div>
<main id="register"></main>

<footer>
  <strong id="footer-title"></strong> &mdash; Alle Rezepte handverlesen &amp; selbst erprobt.
</footer>

<script src="sidebar.js"></script>
<script>
  window.SIDEBAR_PREFIX       = '';
  window.SIDEBAR_CURRENT_FILE = null;

  document.getElementById('topbar-title').innerHTML =
    COOKBOOK_TITLE.replace(/\s(\S+)$/, ' <em>$1</em>');
  document.getElementById('hero-title').innerHTML = `<em>${COOKBOOK_TITLE}</em>`;
  document.getElementById('hero-sub').textContent = COOKBOOK_SUBTITLE;
  document.getElementById('footer-title').textContent = COOKBOOK_TITLE;

  const totalRecipes = RECIPES.reduce((s, c) => s + c.items.length, 0);
  const totalTags    = [...new Set(RECIPES.flatMap(c => c.items.flatMap(r => r.tags)))].length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-num">${totalRecipes}</div><div class="stat-label">Rezepte</div></div>
    <div class="stat"><div class="stat-num">${RECIPES.length}</div><div class="stat-label">Kategorien</div></div>
    <div class="stat"><div class="stat-num">${totalTags}</div><div class="stat-label">Schlagworte</div></div>`;

  const diffClass = d =>
    d === 'einfach' ? 'badge-diff-einfach' :
    d === 'mittel'  ? 'badge-diff-mittel'  : 'badge-diff-anspruchsvoll';

  const register = document.getElementById('register');
  RECIPES.forEach(cat => {
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.id = cat.category.toLowerCase().replace(/\s+/g, '-');
    sec.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <h2 class="section-title">${cat.category}</h2>
        <span class="section-count">${cat.items.length} Rezept${cat.items.length !== 1 ? 'e' : ''}</span>
      </div>
      <div class="recipe-grid">
        ${cat.items.map(r => `
          <a class="recipe-card" href="${r.file}">
            <div class="card-title">${r.title}</div>
            <div class="card-desc">${r.description}</div>
            <div class="card-meta">
              <span class="badge badge-time">⏱ ${r.time}</span>
              <span class="badge ${diffClass(r.difficulty)}">${r.difficulty}</span>
            </div>
            <div class="card-tags">${r.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
          </a>`).join('')}
      </div>`;
    register.appendChild(sec);
  });
</script>
</body>
</html>
