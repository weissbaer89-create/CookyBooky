<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Cucina – Kochbuch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <script src="recipes.js"></script>
  <style>
    .hero { padding: 4rem 2rem 2.5rem; max-width: 940px; margin: 0 auto; }
    .hero-eyebrow { font-size: .72rem; text-transform: uppercase; letter-spacing: .2em; color: var(--muted); margin-bottom: 1rem; font-weight: 500; }
    .hero-title { font-family: var(--ff-display); font-size: clamp(2.6rem, 6vw, 4.8rem); line-height: 1.04; color: var(--ink); transition: color .3s; }
    .hero-title em { font-style: italic; color: var(--accent); }
    .hero-sub { margin-top: 1rem; font-size: 1.05rem; color: var(--muted); font-weight: 300; max-width: 480px; line-height: 1.75; }
    .hero-divider { width: 56px; height: 2px; background: var(--gold); margin: 2rem 0; border-radius: 1px; }

    .stats-bar { display: flex; flex-wrap: wrap; gap: 2.5rem; padding: 0 2rem 3rem; max-width: 940px; margin: 0 auto; }
    .stat-num { font-family: var(--ff-display); font-size: 2.2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

    /* Country sections */
    .country-section { max-width: 940px; margin: 0 auto; padding: 0 2rem 3.5rem; }
    .country-header {
      display: flex; align-items: center; gap: .75rem;
      padding-bottom: .75rem; margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border); transition: border-color .3s;
    }
    .country-flag { display: flex; align-items: center; }
    .country-name { font-family: var(--ff-display); font-size: 1.6rem; }
    .country-count { margin-left: auto; font-size: .8rem; color: var(--muted); }

    /* Subcategory blocks */
    .subcat-block { margin-bottom: 2rem; }
    .subcat-header {
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: 1rem; padding-left: .25rem;
    }
    .subcat-icon { font-size: 1rem; }
    .subcat-name { font-size: .85rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
    .recipe-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: .45rem;
      transition: transform .2s, box-shadow .2s, border-color .2s, background .3s;
      box-shadow: var(--shadow);
    }
    .recipe-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hov); border-color: var(--gold); }
    .card-title { font-family: var(--ff-display); font-size: 1rem; line-height: 1.3; }
    .card-desc { font-size: .78rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: .45rem; margin-top: .2rem; flex-wrap: wrap; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .3rem; }

    /* Topbar */
    .topbar-title { font-family: var(--ff-display); font-size: 1.2rem; letter-spacing: .01em; flex: 1; }
    .topbar-title em { font-style: italic; color: var(--accent); }
    .topbar-link { font-size: .8rem; color: var(--muted); text-decoration: none; white-space: nowrap; transition: color .2s; }
    .topbar-link:hover { color: var(--accent); }

    footer { border-top: 1px solid var(--border); padding: 2rem; text-align: center; font-size: .8rem; color: var(--muted); transition: border-color .3s; }
    footer strong { color: var(--ink); font-family: var(--ff-display); }

    @media (max-width: 600px) {
      .hero { padding: 2.5rem 1.25rem 1.5rem; }
      .stats-bar { padding: 0 1.25rem 2rem; }
      .country-section { padding: 0 1.25rem 2.5rem; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<nav id="sidebar" aria-label="Rezept-Navigation">
  <div class="sb-header">
    <a class="sb-logo" id="sb-logo" href="index.html"></a>
    <button class="sb-close" onclick="closeSidebar()" aria-label="Schließen">✕</button>
  </div>
  <div id="sb-nav-body"></div>
  <div class="sb-footer">
    <span class="sb-footer-label">Erscheinungsbild</span>
    <div class="theme-toggle">
      <span class="theme-label">Dunkel</span>
      <div class="toggle-track on" onclick="toggleTheme()" role="switch" aria-label="Theme wechseln">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</nav>

<!-- ── Topbar ──────────────────────────────────────────────── -->
<header id="topbar">
  <button class="burger-btn" onclick="openSidebar()" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-title" id="topbar-title"></div>
  <a class="topbar-link" href="register.html">📖 Register</a>
  <button class="topbar-theme-btn" onclick="toggleTheme()" aria-label="Theme wechseln">☀️</button>
</header>

<!-- ── Hero ───────────────────────────────────────────────── -->
<section class="hero">
  <p class="hero-eyebrow">Hausgemachte Rezepte mit Seele</p>
  <h1 class="hero-title" id="hero-title"></h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-divider"></div>
</section>

<div class="stats-bar" id="stats-bar"></div>

<!-- ── Rezept-Übersicht ────────────────────────────────────── -->
<main id="main-content"></main>

<footer>
  <strong id="footer-title"></strong> &mdash; Alle Rezepte handverlesen &amp; selbst erprobt.
</footer>

<!-- ── Scripts ────────────────────────────────────────────── -->
<script>
  window.SIDEBAR_PREFIX       = '';
  window.SIDEBAR_CURRENT_FILE = null;
</script>
<script src="sidebar.js"></script>
<script>
  // Texte
  document.getElementById('topbar-title').innerHTML = COOKBOOK_TITLE.replace(/\s(\S+)$/, ' <em>$1</em>');
  document.getElementById('hero-title').innerHTML = `<em>${COOKBOOK_TITLE}</em>`;
  document.getElementById('hero-sub').textContent = COOKBOOK_SUBTITLE;
  document.getElementById('footer-title').textContent = COOKBOOK_TITLE;

  // Stats
  const totalRecipes = RECIPES.reduce(function (s, c) {
    return s + c.subcategories.reduce(function (ss, sub) { return ss + sub.items.length; }, 0);
  }, 0);
  const totalSubs = RECIPES.reduce(function (s, c) { return s + c.subcategories.length; }, 0);
  document.getElementById('stats-bar').innerHTML =
    `<div class="stat"><div class="stat-num">${totalRecipes}</div><div class="stat-label">Rezepte</div></div>` +
    `<div class="stat"><div class="stat-num">${RECIPES.length}</div><div class="stat-label">Länder</div></div>` +
    `<div class="stat"><div class="stat-num">${totalSubs}</div><div class="stat-label">Kategorien</div></div>`;

  // Rezeptübersicht nach Land → Unterkategorie
  const diffClass = function (d) {
    return d === 'einfach' ? 'badge-diff-einfach' :
           d === 'mittel'  ? 'badge-diff-mittel'  : 'badge-diff-anspruchsvoll';
  };

  const main = document.getElementById('main-content');
  RECIPES.forEach(function (country) {
    const countryTotal = country.subcategories.reduce(function (s, sub) { return s + sub.items.length; }, 0);
    const section = document.createElement('section');
    section.className = 'country-section';

    let html = `<div class="country-header">
      <span class="country-flag"><img src="https://flagcdn.com/${country.code}.svg" height="20" alt="${country.country}"></span>
      <h2 class="country-name">${country.country}</h2>
      <span class="country-count">${countryTotal} Rezept${countryTotal !== 1 ? 'e' : ''}</span>
    </div>`;

    country.subcategories.forEach(function (sub) {
      html += `<div class="subcat-block">
        <div class="subcat-header">
          <span class="subcat-icon">${sub.icon}</span>
          <span class="subcat-name">${sub.name}</span>
        </div>
        <div class="recipe-grid">
          ${sub.items.map(function (r) {
            return `<a class="recipe-card" href="${r.file}">
              <div class="card-title">${r.title}</div>
              <div class="card-desc">${r.description}</div>
              <div class="card-meta">
                <span class="badge badge-time">⏱ ${r.time}</span>
                <span class="badge ${diffClass(r.difficulty)}">${r.difficulty}</span>
              </div>
              <div class="card-tags">${r.tags.map(function (t) { return `<span class="tag">#${t}</span>`; }).join('')}</div>
            </a>`;
          }).join('')}
        </div>
      </div>`;
    });

    section.innerHTML = html;
    main.appendChild(section);
  });
</script>
</body>
</html>
