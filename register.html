<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Bella Cucina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <script src="recipes.js"></script>
  <style>
    .topbar-breadcrumb { display: flex; align-items: center; gap: .5rem; font-size: .875rem; color: var(--muted); flex: 1; overflow: hidden; }
    .topbar-breadcrumb a { color: var(--muted); text-decoration: none; transition: color .2s; white-space: nowrap; }
    .topbar-breadcrumb a:hover { color: var(--accent); }
    .topbar-breadcrumb .sep { color: var(--border); }
    .topbar-breadcrumb .current { color: var(--ink); font-weight: 500; transition: color .3s; }

    /* ── Page hero ────────────────────────────────────────── */
    .page-hero { max-width: 880px; margin: 0 auto; padding: 3.5rem 2rem 1.5rem; }
    .page-eyebrow { font-size: .72rem; text-transform: uppercase; letter-spacing: .2em; color: var(--muted); margin-bottom: .75rem; font-weight: 500; }
    .page-title { font-family: var(--ff-display); font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.08; color: var(--ink); transition: color .3s; }
    .page-title em { font-style: italic; color: var(--accent); }
    .page-divider { width: 48px; height: 2px; background: var(--gold); margin: 1.5rem 0 0; border-radius: 1px; }

    /* ── Filter bar ───────────────────────────────────────── */
    .filter-wrap {
      max-width: 880px; margin: 0 auto;
      padding: 1.75rem 2rem 0;
      display: flex; flex-wrap: wrap; gap: 1.25rem 2rem; align-items: flex-start;
    }
    .filter-divider {
      width: 1px; background: var(--border);
      align-self: stretch; margin: .25rem 0;
      flex-shrink: 0;
    }
    @media (max-width: 700px) { .filter-divider { display: none; } }
    .filter-group { display: flex; flex-direction: column; gap: .5rem; }
    .filter-group-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); font-weight: 500; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .chip {
      padding: .32rem .8rem; border-radius: 99px;
      border: 1px solid var(--border); background: var(--card-bg);
      color: var(--muted); font-size: .76rem; cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      display: flex; align-items: center; gap: .3rem;
      font-family: var(--ff-body); white-space: nowrap;
    }
    .chip:hover { background: var(--paper); color: var(--ink); border-color: var(--muted); }
    /* Alle-Chips */
    .chip.active-all    { background: var(--ink); border-color: var(--ink); color: var(--cream); }
    html.dark .chip.active-all { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.2); color: var(--ink); }
    /* Land-Chip aktiv */
    .chip.active-country { background: var(--gold); border-color: var(--gold); color: #1a1208; }
    /* Kategorie-Chip aktiv */
    .chip.active-subcat { background: var(--accent); border-color: var(--accent); color: #fff; }
    /* Schwierigkeit */
    .chip.active-easy   { background: #2d7a3a; border-color: #2d7a3a; color: #fff; }
    .chip.active-medium { background: #9a6e00; border-color: #9a6e00; color: #fff; }
    .chip.active-hard   { background: #b5352a; border-color: #b5352a; color: #fff; }

    /* Reset-Zeile */
    .filter-reset-row {
      max-width: 880px; margin: .75rem auto 0; padding: 0 2rem;
    }
    .filter-reset-btn {
      background: none; border: 1px dashed var(--border);
      border-radius: 99px; padding: .28rem .75rem;
      font-size: .72rem; color: var(--muted); cursor: pointer;
      font-family: var(--ff-body);
      transition: border-color .15s, color .15s;
    }
    .filter-reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Results count */
    .results-info { max-width: 880px; margin: 0 auto; padding: 1rem 2rem .25rem; font-size: .8rem; color: var(--muted); }

    /* ── Alpha Jump Bar ───────────────────────────────────── */
    .alpha-bar { max-width: 880px; margin: 0 auto; padding: .75rem 2rem 0; display: flex; flex-wrap: wrap; gap: .3rem; }
    .alpha-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card-bg);
      color: var(--muted); font-size: .75rem; font-weight: 500;
      text-decoration: none; display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
    }
    .alpha-btn.has { color: var(--ink); }
    .alpha-btn.has:hover { background: var(--paper); border-color: var(--muted); }
    .alpha-btn.none { opacity: .25; pointer-events: none; }

    /* ── Register body ────────────────────────────────────── */
    .register-body { max-width: 880px; margin: 0 auto; padding: 1.5rem 2rem 5rem; }

    /* Letter group */
    .letter-group { margin-bottom: 2.25rem; }
    .letter-heading {
      font-family: var(--ff-display); font-size: 1.9rem; font-weight: 700;
      color: var(--accent); opacity: .3; line-height: 1;
      margin-bottom: .6rem; padding-bottom: .5rem;
      border-bottom: 1px solid var(--border); transition: border-color .3s;
      scroll-margin-top: 76px;
    }

    /* Row */
    .reg-row {
      display: grid; grid-template-columns: 1fr auto auto auto;
      align-items: center; gap: .75rem;
      padding: .55rem .5rem; border-radius: 8px;
      text-decoration: none; color: inherit;
      border-bottom: 1px dashed var(--border);
      transition: background .15s, padding .15s, border-color .3s;
    }
    .reg-row:last-child { border-bottom: none; }
    .reg-row:hover { background: var(--card-bg); padding-left: .9rem; }
    .reg-title { font-family: var(--ff-display); font-size: .96rem; line-height: 1.3; }
    .reg-sub { font-size: .68rem; color: var(--muted); margin-top: .1rem; }
    .reg-country { font-size: .72rem; color: var(--muted); white-space: nowrap; }
    .reg-time { font-size: .7rem; color: var(--muted); white-space: nowrap; }
    .reg-diff {
      font-size: .62rem; padding: .18rem .5rem; border-radius: 99px; font-weight: 500;
      white-space: nowrap;
    }
    .diff-einfach       { background: #0d2010; color: #6db87a; border: 1px solid #1a3820; }
    .diff-mittel        { background: #201500; color: #c9951a; border: 1px solid #3a2800; }
    .diff-anspruchsvoll { background: #200808; color: #e07060; border: 1px solid #3a1010; }
    html:not(.dark) .diff-einfach       { background: #eaf7ec; color: #2d7a3a; border: 1px solid #c3e6c7; }
    html:not(.dark) .diff-mittel        { background: #fff8e6; color: #9a6e00; border: 1px solid #f0dcb0; }
    html:not(.dark) .diff-anspruchsvoll { background: #fdecea; color: #b5352a; border: 1px solid #f5c6c2; }

    /* Empty state */
    .reg-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: .9rem; }
    .reg-empty-icon { font-size: 2.5rem; display: block; margin-bottom: .75rem; }

    footer { border-top: 1px solid var(--border); padding: 2rem; text-align: center; font-size: .8rem; color: var(--muted); transition: border-color .3s; }
    footer strong { color: var(--ink); font-family: var(--ff-display); }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .page-hero, .filter-wrap, .alpha-bar, .register-body { padding-left: 1.25rem; padding-right: 1.25rem; }
      .reg-row { grid-template-columns: 1fr auto; }
      .reg-country, .reg-time { display: none; }
    }
  </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<nav id="sidebar" aria-label="Rezept-Navigation">
  <div class="sb-header">
    <a class="sb-logo" id="sb-logo" href="index.html"></a>
    <button class="sb-close" onclick="closeSidebar()" aria-label="Schließen">✕</button>
  </div>
  <div id="sb-nav-body"></div>
  <div class="sb-footer">
    <span class="sb-footer-label">Erscheinungsbild</span>
    <div class="theme-toggle">
      <span class="theme-label">Dunkel</span>
      <div class="toggle-track on" onclick="toggleTheme()" role="switch" aria-label="Theme wechseln">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</nav>

<!-- ── Topbar ──────────────────────────────────────────────── -->
<header id="topbar">
  <button class="burger-btn" onclick="openSidebar()" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>
  <nav class="topbar-breadcrumb">
    <a href="index.html">Kochbuch</a>
    <span class="sep">›</span>
    <span class="current">Register</span>
  </nav>
  <button class="topbar-theme-btn" onclick="toggleTheme()" aria-label="Theme wechseln">☀️</button>
</header>

<!-- ── Hero ───────────────────────────────────────────────── -->
<div class="page-hero">
  <p class="page-eyebrow">Vollständiges Verzeichnis</p>
  <h1 class="page-title"><em>Register</em></h1>
  <div class="page-divider"></div>
</div>

<!-- ── Filter ─────────────────────────────────────────────── -->
<div class="filter-wrap">
  <div class="filter-group">
    <div class="filter-group-label">Land</div>
    <div class="filter-chips" id="country-chips"></div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <div class="filter-group-label">Kategorie</div>
    <div class="filter-chips" id="subcat-chips"></div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <div class="filter-group-label">Schwierigkeitsgrad</div>
    <div class="filter-chips" id="diff-chips"></div>
  </div>
</div>
<div class="filter-reset-row" id="filter-reset-row" style="display:none">
  <button class="filter-reset-btn" id="filter-reset-btn">✕ Alle Filter zurücksetzen</button>
</div>

<div class="results-info" id="results-info"></div>
<div class="alpha-bar" id="alpha-bar"></div>
<main class="register-body" id="register-body"></main>

<footer>
  <strong id="footer-title"></strong> &mdash; <a href="index.html">← Zurück zur Startseite</a>
</footer>

<!-- ── Scripts ────────────────────────────────────────────── -->
<script>
  window.SIDEBAR_PREFIX       = '';
  window.SIDEBAR_CURRENT_FILE = null;
</script>
<script src="sidebar.js"></script>
<script>
  document.getElementById('footer-title').textContent = COOKBOOK_TITLE;

  /* ── Alle Rezepte flach ────────────────────────────────── */
  const allRecipes = [];
  RECIPES.forEach(function (country) {
    country.subcategories.forEach(function (sub) {
      sub.items.forEach(function (r) {
        allRecipes.push(Object.assign({}, r, {
          country:    country.country,
          flag:       country.flag,
          code:       country.code,
          subcat:     sub.name,
          subcatIcon: sub.icon
        }));
      });
    });
  });
  allRecipes.sort(function (a, b) { return a.title.localeCompare(b.title, 'de'); });

  /* ── Aktive Filter ─────────────────────────────────────── */
  let activeCountry = null;   // null = alle
  let activeSubcat  = null;
  let activeDiff    = null;

  /* ── Hilfsfunktion: alle Chips einer Gruppe deaktivieren ─ */
  function clearGroup(selector) {
    document.querySelectorAll(selector + ' .chip').forEach(function (c) {
      c.className = 'chip';
    });
  }

  /* ── Reset-Button ──────────────────────────────────────── */
  const resetRow = document.getElementById('filter-reset-row');
  const resetBtn = document.getElementById('filter-reset-btn');
  resetBtn.addEventListener('click', function () {
    activeCountry = activeSubcat = activeDiff = null;
    // Alle „Alle"-Chips aktivieren
    document.getElementById('country-all-btn').className  = 'chip active-all';
    document.getElementById('subcat-all-btn').className   = 'chip active-all';
    document.getElementById('diff-all-btn').className     = 'chip active-all';
    // Restliche Chips zurücksetzen
    ['#country-chips .chip:not(#country-all-btn)',
     '#subcat-chips .chip:not(#subcat-all-btn)',
     '#diff-chips .chip:not(#diff-all-btn)'].forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (c) { c.className = 'chip'; });
    });
    updateResetVisibility();
    render();
  });

  function updateResetVisibility() {
    const anyActive = activeCountry !== null || activeSubcat !== null || activeDiff !== null;
    resetRow.style.display = anyActive ? 'block' : 'none';
  }

  /* ── LAND-Filter bauen ─────────────────────────────────── */
  const countryContainer = document.getElementById('country-chips');

  const countryAllBtn = document.createElement('button');
  countryAllBtn.id = 'country-all-btn';
  countryAllBtn.className = 'chip active-all';
  countryAllBtn.textContent = 'Alle';
  countryAllBtn.addEventListener('click', function () {
    activeCountry = null;
    clearGroup('#country-chips');
    countryAllBtn.className = 'chip active-all';
    updateResetVisibility(); render();
  });
  countryContainer.appendChild(countryAllBtn);

  RECIPES.forEach(function (country) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.innerHTML = '<img src="https://flagcdn.com/' + country.code + '.svg" height="13" alt="' + country.country + '"> ' + country.country;
    btn.addEventListener('click', function () {
      activeCountry = country.country;
      clearGroup('#country-chips');
      countryAllBtn.className = 'chip';
      btn.className = 'chip active-country';
      updateResetVisibility(); render();
    });
    countryContainer.appendChild(btn);
  });

  /* ── UNTERKATEGORIE-Filter bauen ───────────────────────── */
  const subcatContainer = document.getElementById('subcat-chips');

  const subcatAllBtn = document.createElement('button');
  subcatAllBtn.id = 'subcat-all-btn';
  subcatAllBtn.className = 'chip active-all';
  subcatAllBtn.textContent = 'Alle';
  subcatAllBtn.addEventListener('click', function () {
    activeSubcat = null;
    clearGroup('#subcat-chips');
    subcatAllBtn.className = 'chip active-all';
    updateResetVisibility(); render();
  });
  subcatContainer.appendChild(subcatAllBtn);

  // Deduplizierte, sortierte Unterkategorie-Liste
  const subcatsSeen = new Set();
  const subcatList  = [];
  RECIPES.forEach(function (country) {
    country.subcategories.forEach(function (sub) {
      if (!subcatsSeen.has(sub.name)) {
        subcatsSeen.add(sub.name);
        subcatList.push({ name: sub.name, icon: sub.icon });
      }
    });
  });
  subcatList.sort(function (a, b) { return a.name.localeCompare(b.name, 'de'); });

  subcatList.forEach(function (sub) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = sub.icon + ' ' + sub.name;
    btn.addEventListener('click', function () {
      activeSubcat = sub.name;
      clearGroup('#subcat-chips');
      subcatAllBtn.className = 'chip';
      btn.className = 'chip active-subcat';
      updateResetVisibility(); render();
    });
    subcatContainer.appendChild(btn);
  });

  /* ── SCHWIERIGKEITS-Filter bauen ───────────────────────── */
  const diffDefs = [
    { key: null,             label: 'Alle',            cls: 'active-all'    },
    { key: 'einfach',       label: '🟢 Einfach',       cls: 'active-easy'   },
    { key: 'mittel',        label: '🟡 Mittel',        cls: 'active-medium' },
    { key: 'anspruchsvoll', label: '🔴 Anspruchsvoll', cls: 'active-hard'   },
  ];
  const diffContainer = document.getElementById('diff-chips');
  let diffAllBtn;

  diffDefs.forEach(function (def, i) {
    const btn = document.createElement('button');
    btn.className = 'chip' + (def.key === null ? ' active-all' : '');
    if (def.key === null) { btn.id = 'diff-all-btn'; diffAllBtn = btn; }
    btn.textContent = def.label;
    btn.addEventListener('click', function () {
      activeDiff = def.key;
      clearGroup('#diff-chips');
      if (def.key === null) diffAllBtn.className = 'chip active-all';
      btn.className = 'chip ' + def.cls;
      updateResetVisibility(); render();
    });
    diffContainer.appendChild(btn);
  });

  /* ── Render ────────────────────────────────────────────── */
  const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  function diffClass(d) {
    return d === 'einfach' ? 'diff-einfach' : d === 'mittel' ? 'diff-mittel' : 'diff-anspruchsvoll';
  }

  function render() {
    const filtered = allRecipes.filter(function (r) {
      if (activeCountry && r.country    !== activeCountry) return false;
      if (activeSubcat  && r.subcat     !== activeSubcat)  return false;
      if (activeDiff    && r.difficulty !== activeDiff)    return false;
      return true;
    });

    // Ergebnisinfo
    const parts = [];
    if (activeCountry) parts.push(activeCountry);
    if (activeSubcat)  parts.push(activeSubcat);
    if (activeDiff)    parts.push(activeDiff);
    document.getElementById('results-info').textContent =
      filtered.length + ' Rezept' + (filtered.length !== 1 ? 'e' : '') +
      (parts.length ? ' · ' + parts.join(' · ') : '');

    // Buchstaben-Gruppen
    const groups = {};
    filtered.forEach(function (r) {
      const l = r.title[0].toUpperCase();
      if (!groups[l]) groups[l] = [];
      groups[l].push(r);
    });
    const activeLetters = new Set(Object.keys(groups));

    // Alpha-Bar
    const alphaBar = document.getElementById('alpha-bar');
    alphaBar.innerHTML = '';
    ALPHABET.forEach(function (l) {
      const a = document.createElement('a');
      const has = activeLetters.has(l);
      a.className = 'alpha-btn ' + (has ? 'has' : 'none');
      a.textContent = l;
      if (has) a.href = '#letter-' + l;
      alphaBar.appendChild(a);
    });

    // Register-Body
    const body = document.getElementById('register-body');
    body.innerHTML = '';

    if (!filtered.length) {
      body.innerHTML = '<div class="reg-empty"><span class="reg-empty-icon">🍽️</span>Keine Rezepte für diese Kombination.</div>';
      return;
    }

    Object.keys(groups).sort().forEach(function (letter) {
      const group = document.createElement('div');
      group.className = 'letter-group';

      const heading = document.createElement('div');
      heading.className = 'letter-heading';
      heading.id = 'letter-' + letter;
      heading.textContent = letter;
      group.appendChild(heading);

      groups[letter].forEach(function (r) {
        const a = document.createElement('a');
        a.className = 'reg-row';
        a.href = r.file;
        a.innerHTML =
          `<div>
            <div class="reg-title">${r.title}</div>
            <div class="reg-sub">${r.subcatIcon} ${r.subcat}</div>
          </div>
          <span class="reg-country"><img src="https://flagcdn.com/${r.code}.svg" height="11" alt="${r.country}" style="vertical-align:middle;margin-right:.25rem">${r.country}</span>
          <span class="reg-time">⏱ ${r.time}</span>
          <span class="reg-diff ${diffClass(r.difficulty)}">${r.difficulty}</span>`;
        group.appendChild(a);
      });

      body.appendChild(group);
    });
  }

  render();
</script>
</body>
</html>
